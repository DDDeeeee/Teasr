<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title id="page-title">TEASR Phone Microphone</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: rgba(15, 23, 42, 0.78);
        --line: rgba(255, 255, 255, 0.12);
        --text: #eef2ff;
        --muted: #c7d2fe;
        --accent: #fbbf24;
        --ok: #34d399;
        --warn: #f59e0b;
        --bad: #fb7185;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "PingFang SC", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(251, 191, 36, 0.24), transparent 28%),
          linear-gradient(180deg, #0f172a 0%, #111827 100%);
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .panel {
        width: min(100%, 440px);
        padding: 26px;
        border-radius: 24px;
        background: var(--panel);
        border: 1px solid var(--line);
        backdrop-filter: blur(18px);
        box-shadow: 0 22px 48px rgba(0, 0, 0, 0.28);
      }

      h1 { margin: 0 0 8px; font-size: 28px; }
      p { margin: 0 0 18px; line-height: 1.6; color: var(--muted); }

      .status {
        display: grid;
        gap: 12px;
        margin: 18px 0 20px;
      }

      .status-item {
        padding: 14px 16px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .label {
        display: block;
        margin-bottom: 4px;
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .value { font-size: 16px; font-weight: 700; }
      .ok { color: var(--ok); }
      .warn { color: var(--warn); }
      .bad { color: var(--bad); }

      .actions {
        display: grid;
        gap: 12px;
      }

      button {
        border: 0;
        border-radius: 16px;
        padding: 16px 18px;
        font-size: 16px;
        font-weight: 700;
      }

      .primary { background: var(--accent); color: #111827; }
      .secondary { background: rgba(255, 255, 255, 0.08); color: var(--text); }

      #log {
        margin-top: 18px;
        padding: 14px;
        min-height: 96px;
        border-radius: 16px;
        background: rgba(2, 6, 23, 0.46);
        color: var(--muted);
        white-space: pre-wrap;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1 id="heading">Phone Microphone</h1>
      <p id="subtitle">Authorize the microphone once, keep this page ready, and let the desktop app control recording start and stop.</p>
      <section class="status">
        <div class="status-item">
          <span class="label" id="connection-label">Connection</span>
          <span class="value warn" id="connection-state">connecting</span>
        </div>
        <div class="status-item">
          <span class="label" id="permission-label">Permission</span>
          <span class="value warn" id="permission-state">required</span>
        </div>
        <div class="status-item">
          <span class="label" id="capture-label">Capture</span>
          <span class="value" id="capture-state">idle</span>
        </div>
      </section>
      <section class="actions">
        <button class="primary" id="authorize-btn">Authorize and Stay Ready</button>
        <button class="secondary" id="disconnect-btn">Disconnect</button>
      </section>
      <pre id="log"></pre>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
