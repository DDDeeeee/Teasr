          fill="white" opacity="0.08"/>

    <!-- ===== CUP RIM ===== -->
    <ellipse cx="248" cy="248" rx="98" ry="24" fill="#f0e8d8"/>
    <ellipse cx="248" cy="246" rx="98" ry="24" fill="#f5efe4"/>
    <ellipse cx="248" cy="247" rx="86" ry="20" fill="#e0d4c0"/>
    <ellipse cx="248" cy="248" rx="82" ry="18" fill="#2a2218"/>

    <!-- ===== TEA ===== -->
    <ellipse cx="248" cy="252" rx="78" ry="16" fill="url(#teaSurface)" opacity="0.9"/>
    <ellipse cx="234" cy="249" rx="32" ry="7" fill="#c8a030" opacity="0.35"/>
    <ellipse cx="260" cy="254" rx="18" ry="4" fill="#d4aa38" opacity="0.15"/>

    <!-- ===== HANDLE ===== -->
    <path d="M338 280
             C370 280 386 300 386 320
             C386 340 370 358 338 358"
          fill="none" stroke="#1e1e24" stroke-width="20" stroke-linecap="round" opacity="0.3"/>
    <path d="M336 276
             C368 276 384 296 384 318
             C384 340 368 356 336 356"
          fill="none" stroke="url(#handleGrad)" stroke-width="15" stroke-linecap="round"/>
    <path d="M340 284
             C362 284 374 300 374 318
             C374 336 362 350 340 350"
          fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.25"/>

