<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="cupBody" x1="0.15" y1="0" x2="0.85" y2="0">
      <stop offset="0%" stop-color="#e0d4c0"/>
      <stop offset="25%" stop-color="#f5efe4"/>
      <stop offset="60%" stop-color="#faf6ef"/>
      <stop offset="100%" stop-color="#e4d8c4"/>
    </linearGradient>
    <linearGradient id="cupVert" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf6ef"/>
      <stop offset="100%" stop-color="#e0d4be"/>
    </linearGradient>
    <linearGradient id="saucerFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8dcc6"/>
      <stop offset="100%" stop-color="#d0c0a4"/>
    </linearGradient>
    <linearGradient id="saucerEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0aa88"/>
      <stop offset="100%" stop-color="#a89070"/>
    </linearGradient>
    <linearGradient id="teaSurface" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#b8922c"/>
      <stop offset="100%" stop-color="#6e4e10"/>
    </linearGradient>
    <linearGradient id="handleGrad" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#ece4d4"/>
      <stop offset="100%" stop-color="#c8b898"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="248" fill="#1e1e24"/>

  <g transform="translate(8,0)">
    <!-- ===== SAUCER ===== -->
    <ellipse cx="248" cy="392" rx="158" ry="32" fill="#9a8468"/>
    <ellipse cx="248" cy="386" rx="158" ry="32" fill="url(#saucerEdge)"/>
    <ellipse cx="248" cy="384" rx="142" ry="27" fill="url(#saucerFace)"/>
    <ellipse cx="248" cy="383" rx="100" ry="18" fill="#c4b08c" opacity="0.45"/>
    <ellipse cx="220" cy="378" rx="60" ry="10" fill="white" opacity="0.08"/>

    <!-- ===== CUP BODY ===== -->
    <ellipse cx="248" cy="378" rx="78" ry="14" fill="#1e1e24" opacity="0.3"/>

    <path d="M152 248
             Q148 250 150 258
             C156 320 172 358 188 372
             Q196 378 210 380
             L286 380
             Q300 378 308 372
             C324 358 340 320 346 258
             Q348 250 344 248
             Z"
          fill="url(#cupBody)"/>

    <path d="M152 248
             Q148 250 150 258
             C156 320 172 358 188 372
             Q196 378 210 380
             L286 380
             Q300 378 308 372
             C324 358 340 320 346 258
             Q348 250 344 248
             Z"
          fill="url(#cupVert)" opacity="0.5"/>

    <path d="M160 258
             C166 316 176 350 188 370
             L180 370
             C168 350 160 318 156 260
             Z"
          fill="#c4b8a4" opacity="0.5"/>

    <path d="M320 260
             C326 300 318 340 306 368
             L312 370
             C324 342 332 302 326 260
             Z"
