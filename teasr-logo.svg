                       M218 218 C224 190 212 176 220 150 C228 124 214 106 220 80;
                       M218 218 C212 192 226 178 218 152 C210 126 224 108 220 82"
               dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.35;0.12;0.35" dur="3.2s" repeatCount="indefinite"/>
    </path>

    <path d="M248 214 C242 185 258 170 250 142 C242 114 256 96 252 68"
          fill="none" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.45">
      <animate attributeName="d"
               values="M248 214 C242 185 258 170 250 142 C242 114 256 96 252 68;
                       M248 214 C254 183 240 168 248 140 C256 112 242 94 248 66;
                       M248 214 C242 185 258 170 250 142 C242 114 256 96 252 68"
               dur="3.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.45;0.15;0.45" dur="3.8s" repeatCount="indefinite"/>
    </path>

    <path d="M276 218 C282 194 270 182 278 158 C286 134 274 118 278 94"
          fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.3">
      <animate attributeName="d"
               values="M276 218 C282 194 270 182 278 158 C286 134 274 118 278 94;
                       M276 218 C270 192 282 180 274 156 C266 132 278 116 274 92;
                       M276 218 C282 194 270 182 278 158 C286 134 274 118 278 94"
               dur="2.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.08;0.3" dur="2.9s" repeatCount="indefinite"/>
